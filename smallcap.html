<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tool SmallCap | SushiGang Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="topbar">
        <div class="topbar-left">
            <button id="sidebar-toggle"><i class="fa-solid fa-bars"></i></button>
            <a href="index.html" class="logo">Sushi<span>Gang</span></a>
        </div>
        <div class="topbar-right">
            <button id="login-btn" class="btn-primary"><i class="fa-solid fa-user"></i> Đăng nhập</button>
        </div>
    </header>

    <div class="app-container">
        <nav id="sidebar" class="sidebar">
            <ul class="nav-links">
                <li><a href="index.html"><i class="fa-solid fa-house"></i> Trang Chủ</a></li>
                <li><a href="plugins.html"><i class="fa-solid fa-cube"></i> Plugin</a></li>
                <li><a href="about.html"><i class="fa-solid fa-users"></i> Về Chúng Tôi</a></li>
                <li><a href="#"><i class="fa-solid fa-star"></i> Đánh Giá</a></li>
                <li class="nav-divider"></li>
                <li class="active"><a href="smallcap.html"><i class="fa-solid fa-font"></i> Tool SmallCap</a></li>
                <li><a href="#"><i class="fa-solid fa-language"></i> Tool Việt Hóa</a></li>
                <li><a href="symbols.html"><i class="fa-solid fa-icons"></i> Symbol</a></li>
            </ul>
        </nav>

        <main class="main-content">
            <div class="page-header">
                <h2>Tool SmallCap</h2>
                <p>Chuyển đổi chữ thường thành Sᴍᴀʟʟᴄᴀᴘs nhanh chóng.</p>
            </div>
            <div class="symbols-container">
                <div class="tool-layout">
                    <div class="tool-panel">
                        <label style="margin-bottom: 10px; display:block; color: var(--text-secondary); font-weight:600;">Nhập Văn Bản:</label>
                        <textarea id="smallcap-input" placeholder="Nhập nội dung vào đây..." style="width: 100%; height: 220px; padding: 15px; border-radius: 12px; background: var(--bg-tertiary); border: 1px solid var(--border-color); color: white; resize: vertical; font-size: 1rem; font-family: inherit;"></textarea>
                    </div>
                    <div class="tool-panel">
                        <label style="margin-bottom: 10px; display:block; color: var(--text-secondary); font-weight:600;">Kết Quả SmallCap:</label>
                        <textarea id="smallcap-output" readonly placeholder="Kết quả sẽ hiển thị ở đây..." style="width: 100%; height: 220px; padding: 15px; border-radius: 12px; background: var(--bg-main); border: 1px solid var(--border-color); color: var(--accent-secondary); resize: vertical; font-size: 1.1rem; font-family: inherit;"></textarea>
                        <button id="copy-smallcap-btn" class="btn-primary" style="margin-top: 15px; width: 100%;"><i class="fa-solid fa-copy"></i> COPY TOÀN BỘ</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="toast" class="toast hidden"><i class="fa-solid fa-check"></i> <span id="toast-message"></span></div>

    <div id="login-modal" class="modal hidden">
        <div class="modal-content">
            <span id="close-modal" class="close-btn">&times;</span>
            <h2>Đăng nhập</h2>
            <form id="login-form">
                <div class="input-group"><label for="username">Tên</label><input type="text" id="username" required></div>
                <div class="input-group"><label for="password">Mật khẩu</label><input type="password" id="password" required></div>
                <button type="submit" class="btn-primary w-100">Đăng Nhập</button>
            </form>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
